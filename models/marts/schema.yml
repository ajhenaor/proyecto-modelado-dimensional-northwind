version: 2

models:
  - name: fact_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: employee_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_employee')
                field: employee_key
      - name: shipper_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_shipper')
                field: shipper_key
      - name: order_date_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key

  - name: dim_customer
    columns:
      - name: customer_key
        tests:
          - unique
          - not_null

  - name: dim_employee
    columns:
      - name: employee_key
        tests:
          - unique
          - not_null

  - name: dim_shipper
    columns:
      - name: shipper_key
        tests:
          - unique
          - not_null

  - name: dim_date
    columns:
      - name: date_key
        tests:
          - unique
          - not_null
